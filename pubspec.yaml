name: local_shared
description: Lightweight cross-platform secure local storage for Flutter. Native-safe JSON collections and documents with tested CRUD, batch operations, migration semantics, and stream updates.
version: 3.0.0
homepage: https://inidia.app
repository: https://github.com/Nialixus/local_shared.git
issue_tracker: https://github.com/Nialixus/local_shared/issues
funding:
  - https://ko-fi.com/nialixus
screenshots:
  - description: 'Local Shared Logo'
    path: logo.png
topics:
  - flutter
  - secure-storage
  - shared-preferences
  - local-storage
  - data-sync
  - database
  - caching
  - crud
platforms:
  android:
  ios:
  linux:
  macos:
  web:
  windows:

environment:
  sdk: '>=3.4.4 <4.0.0'
  flutter: '>=1.17.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_lints: ^2.0.0
  flutter_test:
    sdk: flutter

